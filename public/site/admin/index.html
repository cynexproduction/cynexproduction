<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CYNEX Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
        background: #0f172a;
        color: #f8fafc;
      }
      .glass {
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .glass-card {
        background: linear-gradient(145deg, rgba(30, 41, 59, 0.9) 0%, rgba(15, 23, 42, 0.9) 100%);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
      }
      .gradient-text {
        background: linear-gradient(to right, #818cf8, #c084fc);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .input-glass {
        background: rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .input-glass:focus {
        outline: none;
        border-color: #818cf8;
      }
      .btn-gradient {
        background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        color: #fff;
      }
      .btn-gradient:hover {
        background: linear-gradient(135deg, #4f46e5 0%, #9333ea 100%);
      }
      .btn-danger {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
      }
      .btn-danger:hover {
        background: rgba(239, 68, 68, 0.3);
      }
      .loader {
        border: 3px solid rgba(255, 255, 255, 0.1);
        border-top: 3px solid #818cf8;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;
      const PW_KEY = "cynex_admin_pw";

      function authHeaders() {
        const pw = localStorage.getItem(PW_KEY) || "";
        return { "Content-Type": "application/json", "x-admin-password": pw };
      }

      function App() {
        const [authed, setAuthed] = useState(!!localStorage.getItem(PW_KEY));
        const [tab, setTab] = useState("videos");
        const [toast, setToast] = useState(null);

        const showToast = (message, type = "success") => {
          setToast({ message, type });
          setTimeout(() => setToast(null), 3000);
        };

        if (!authed) return <Login onSuccess={() => setAuthed(true)} />;

        return (
          <div class="min-h-screen p-4 md:p-8">
            <div class="max-w-7xl mx-auto">
              <header class="glass rounded-2xl p-6 mb-6 flex flex-wrap justify-between items-center gap-4">
                <div>
                  <h1 class="text-2xl md:text-3xl font-bold gradient-text">CYNEX Production</h1>
                  <p class="text-slate-400 text-sm">Site content management</p>
                </div>
                <div class="flex gap-2">
                  <button
                    onClick={() => setTab("videos")}
                    class={`px-4 py-2 rounded-lg text-sm font-semibold ${tab === "videos" ? "btn-gradient" : "glass"}`}
                  >
                    Videos
                  </button>
                  <button
                    onClick={() => setTab("blog")}
                    class={`px-4 py-2 rounded-lg text-sm font-semibold ${tab === "blog" ? "btn-gradient" : "glass"}`}
                  >
                    Blog
                  </button>
                  <button
                    onClick={() => {
                      localStorage.removeItem(PW_KEY);
                      setAuthed(false);
                    }}
                    class="px-4 py-2 rounded-lg text-sm font-semibold btn-danger"
                  >
                    Logout
                  </button>
                </div>
              </header>

              {tab === "videos" && <VideosPanel showToast={showToast} />}
              {tab === "blog" && <BlogPanel showToast={showToast} />}

              {toast && (
                <div
                  class={`fixed bottom-6 right-6 px-5 py-3 rounded-xl glass shadow-2xl ${toast.type === "error" ? "border-red-500/50 text-red-200" : "border-green-500/50 text-green-200"}`}
                >
                  {toast.message}
                </div>
              )}
            </div>
          </div>
        );
      }

      function Login({ onSuccess }) {
        const [pw, setPw] = useState("");
        const [error, setError] = useState("");
        const [loading, setLoading] = useState(false);

        const submit = async (e) => {
          e.preventDefault();
          setLoading(true);
          setError("");
          try {
            const res = await fetch("/api/admin/login", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password: pw }),
            });
            const data = await res.json();
            if (data.success) {
              localStorage.setItem(PW_KEY, pw);
              onSuccess();
            } else {
              setError(data.error || "Login failed");
            }
          } catch (e) {
            setError("Network error");
          }
          setLoading(false);
        };

        return (
          <div class="flex items-center justify-center min-h-screen p-4">
            <form onSubmit={submit} class="glass-card p-8 rounded-2xl w-full max-w-md">
              <h2 class="text-2xl font-bold mb-6 gradient-text text-center">CYNEX Admin</h2>
              <input
                type="password"
                class="w-full input-glass rounded-lg px-4 py-2 mb-4"
                value={pw}
                onChange={(e) => setPw(e.target.value)}
                placeholder="Admin password"
                required
                autoFocus
              />
              {error && <p class="text-red-400 text-sm mb-4">{error}</p>}
              <button
                type="submit"
                disabled={loading}
                class="w-full btn-gradient py-2 rounded-lg font-semibold flex justify-center"
              >
                {loading ? <div class="loader"></div> : "Login"}
              </button>
            </form>
          </div>
        );
      }

      function VideosPanel({ showToast }) {
        const [videos, setVideos] = useState([]);
        const [loading, setLoading] = useState(true);
        const [search, setSearch] = useState("");
        const [showAdd, setShowAdd] = useState(false);

        const load = useCallback(async () => {
          setLoading(true);
          try {
            const res = await fetch("/api/admin/videos", { headers: authHeaders() });
            if (res.status === 401) {
              localStorage.removeItem(PW_KEY);
              window.location.reload();
              return;
            }
            const data = await res.json();
            setVideos(data.videos || []);
          } catch (e) {
            showToast("Failed to load videos", "error");
          }
          setLoading(false);
        }, []);

        useEffect(() => {
          load();
        }, [load]);

        const updateVideo = async (id, payload) => {
          try {
            const res = await fetch("/api/admin/videos", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ id, ...payload }),
            });
            const data = await res.json();
            if (data.success) {
              setVideos((vs) => vs.map((v) => (v.id === id ? { ...v, ...data.video } : v)));
              showToast("Saved");
            } else {
              showToast(data.error || "Save failed", "error");
            }
          } catch (e) {
            showToast("Network error", "error");
          }
        };

        const deleteVideo = async (id) => {
          if (!confirm("Permanently delete this video?")) return;
          try {
            const res = await fetch("/api/admin/videos", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ id, permanent_delete: true }),
            });
            const data = await res.json();
            if (data.success) {
              setVideos((vs) => vs.filter((v) => v.id !== id));
              showToast("Deleted");
            } else {
              showToast(data.error || "Delete failed", "error");
            }
          } catch (e) {
            showToast("Network error", "error");
          }
        };

        const addVideo = async (payload) => {
          try {
            const res = await fetch("/api/admin/videos", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ create: true, ...payload }),
            });
            const data = await res.json();
            if (data.success) {
              setVideos((vs) => [...vs, data.video]);
              setShowAdd(false);
              showToast("Video added");
            } else {
              showToast(data.error || "Add failed", "error");
            }
          } catch (e) {
            showToast("Network error", "error");
          }
        };

        const filtered = videos.filter((v) => {
          const q = search.toLowerCase();
          return (
            !q ||
            (v.page || "").toLowerCase().includes(q) ||
            (v.section || "").toLowerCase().includes(q) ||
            (v.label || "").toLowerCase().includes(q) ||
            (v.original_id || "").toLowerCase().includes(q)
          );
        });

        return (
          <div>
            <div class="flex flex-wrap gap-3 mb-6 items-center">
              <input
                type="text"
                placeholder="Search by page, section, label, ID..."
                class="flex-1 min-w-[240px] input-glass rounded-lg px-4 py-2"
                value={search}
                onChange={(e) => setSearch(e.target.value)}
              />
              <button
                onClick={() => setShowAdd(true)}
                class="btn-gradient px-5 py-2 rounded-lg font-semibold"
              >
                + Add Video
              </button>
            </div>

            {showAdd && <AddVideoForm onAdd={addVideo} onCancel={() => setShowAdd(false)} />}

            {loading ? (
              <div class="flex justify-center py-20">
                <div class="loader"></div>
              </div>
            ) : (
              <div class="grid md:grid-cols-2 xl:grid-cols-3 gap-4">
                {filtered.map((v) => (
                  <VideoCard
                    key={v.id}
                    video={v}
                    onUpdate={updateVideo}
                    onDelete={deleteVideo}
                  />
                ))}
                {filtered.length === 0 && (
                  <div class="col-span-full text-center text-slate-400 py-20">No videos.</div>
                )}
              </div>
            )}
          </div>
        );
      }

      function AddVideoForm({ onAdd, onCancel }) {
        const [label, setLabel] = useState("");
        const [url, setUrl] = useState("");
        const [category, setCategory] = useState("brand");

        const submit = (e) => {
          e.preventDefault();
          if (!url) return;
          // try to extract YouTube ID
          const m =
            url.match(/youtube\.com\/(?:embed\/|watch\?v=)([A-Za-z0-9_-]+)/) ||
            url.match(/youtu\.be\/([A-Za-z0-9_-]+)/);
          const ytId = m ? m[1] : null;
          const embedUrl = ytId ? `https://www.youtube.com/embed/${ytId}` : url;
          onAdd({
            label: label || "Video",
            override_url: embedUrl,
            original_id: ytId,
            original_url: url,
            category,
            is_added: true,
          });
        };

        return (
          <form onSubmit={submit} class="glass-card rounded-2xl p-5 mb-6 grid md:grid-cols-4 gap-3">
            <input
              type="text"
              placeholder="Title (e.g. Brand Reel)"
              value={label}
              onChange={(e) => setLabel(e.target.value)}
              class="input-glass rounded-lg px-3 py-2"
            />
            <input
              type="text"
              placeholder="YouTube URL or embed URL"
              value={url}
              onChange={(e) => setUrl(e.target.value)}
              class="input-glass rounded-lg px-3 py-2 md:col-span-2"
              required
            />
            <select
              value={category}
              onChange={(e) => setCategory(e.target.value)}
              class="input-glass rounded-lg px-3 py-2"
            >
              <option value="brand">Brand</option>
              <option value="ad">Ad Films</option>
              <option value="corporate">Corporate</option>
              <option value="animation">Animation</option>
              <option value="documentary">Documentary</option>
            </select>
            <div class="md:col-span-4 flex gap-2 justify-end">
              <button type="button" onClick={onCancel} class="glass px-4 py-2 rounded-lg text-sm">
                Cancel
              </button>
              <button type="submit" class="btn-gradient px-5 py-2 rounded-lg text-sm font-semibold">
                Add
              </button>
            </div>
          </form>
        );
      }

      function VideoCard({ video, onUpdate, onDelete }) {
        const [override, setOverride] = useState(video.override_url || "");
        const [label, setLabel] = useState(video.label || "");
        const [category, setCategory] = useState(video.category || "brand");
        const displaySrc =
          override ||
          (video.original_id ? `https://www.youtube.com/embed/${video.original_id}` : "");

        return (
          <div
            class={`glass-card rounded-2xl overflow-hidden flex flex-col ${video.is_deleted ? "opacity-60" : ""}`}
          >
            <div class="relative pt-[56.25%] bg-black">
              {video.is_deleted ? (
                <div class="absolute inset-0 flex items-center justify-center">
                  <span class="text-red-400 font-bold uppercase border border-red-500/50 px-3 py-1 rounded text-xs">
                    Hidden
                  </span>
                </div>
              ) : displaySrc ? (
                <iframe
                  src={displaySrc}
                  class="absolute inset-0 w-full h-full"
                  title="Video"
                  allowFullScreen
                />
              ) : null}
            </div>
            <div class="p-4 flex flex-col gap-3">
              <div class="text-xs text-slate-400 truncate" title={video.page}>
                {video.page || "Custom video"}
                {video.section ? ` — ${video.section}` : ""}
              </div>
              <input
                type="text"
                value={label}
                onChange={(e) => setLabel(e.target.value)}
                placeholder="Label"
                class="input-glass rounded px-2 py-1 text-sm"
              />
              <input
                type="text"
                value={override}
                onChange={(e) => setOverride(e.target.value)}
                placeholder="Override URL (https://youtube.com/embed/...)"
                class="input-glass rounded px-2 py-1 text-sm"
              />
              <select
                value={category}
                onChange={(e) => setCategory(e.target.value)}
                class="input-glass rounded px-2 py-1 text-sm"
              >
                <option value="brand">Brand</option>
                <option value="ad">Ad Films</option>
                <option value="corporate">Corporate</option>
                <option value="animation">Animation</option>
                <option value="documentary">Documentary</option>
              </select>
              <div class="flex gap-2">
                <button
                  onClick={() =>
                    onUpdate(video.id, {
                      override_url: override.trim() || null,
                      label,
                      category,
                    })
                  }
                  class="flex-1 btn-gradient rounded py-1.5 text-sm font-semibold"
                >
                  Save
                </button>
                <button
                  onClick={() => onUpdate(video.id, { is_deleted: !video.is_deleted })}
                  class="flex-1 glass rounded py-1.5 text-sm"
                >
                  {video.is_deleted ? "Show" : "Hide"}
                </button>
                <button
                  onClick={() => onDelete(video.id)}
                  class="btn-danger rounded px-3 py-1.5 text-sm"
                >
                  ✕
                </button>
              </div>
            </div>
          </div>
        );
      }

      function BlogPanel({ showToast }) {
        const [posts, setPosts] = useState([]);
        const [loading, setLoading] = useState(true);
        const [editing, setEditing] = useState(null);

        const load = useCallback(async () => {
          setLoading(true);
          try {
            const res = await fetch("/api/admin/blog", { headers: authHeaders() });
            if (res.status === 401) {
              localStorage.removeItem(PW_KEY);
              window.location.reload();
              return;
            }
            const data = await res.json();
            setPosts(data.posts || []);
          } catch (e) {
            showToast("Failed to load posts", "error");
          }
          setLoading(false);
        }, []);

        useEffect(() => {
          load();
        }, [load]);

        const save = async (post) => {
          try {
            const res = await fetch("/api/admin/blog", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify(post),
            });
            const data = await res.json();
            if (data.success) {
              showToast("Saved");
              setEditing(null);
              load();
            } else {
              showToast(data.error || "Save failed", "error");
            }
          } catch (e) {
            showToast("Network error", "error");
          }
        };

        const remove = async (id) => {
          if (!confirm("Delete this post?")) return;
          try {
            const res = await fetch("/api/admin/blog", {
              method: "POST",
              headers: authHeaders(),
              body: JSON.stringify({ id, action: "delete" }),
            });
            const data = await res.json();
            if (data.success) {
              setPosts((p) => p.filter((x) => x.id !== id));
              showToast("Deleted");
            } else {
              showToast(data.error || "Delete failed", "error");
            }
          } catch (e) {
            showToast("Network error", "error");
          }
        };

        if (editing) return <BlogEditor post={editing} onSave={save} onCancel={() => setEditing(null)} />;

        return (
          <div>
            <div class="flex justify-end mb-6">
              <button
                onClick={() =>
                  setEditing({
                    slug: "",
                    title: "",
                    excerpt: "",
                    content: "",
                    cover_image: "",
                    is_published: true,
                  })
                }
                class="btn-gradient px-5 py-2 rounded-lg font-semibold"
              >
                + New Post
              </button>
            </div>
            {loading ? (
              <div class="flex justify-center py-20">
                <div class="loader"></div>
              </div>
            ) : (
              <div class="grid md:grid-cols-2 gap-4">
                {posts.map((p) => (
                  <div key={p.id} class="glass-card rounded-2xl p-5">
                    <div class="flex justify-between items-start gap-2 mb-2">
                      <h3 class="font-semibold text-lg">{p.title}</h3>
                      {!p.is_published && (
                        <span class="text-xs px-2 py-1 rounded bg-yellow-500/20 text-yellow-300">
                          Draft
                        </span>
                      )}
                    </div>
                    <p class="text-xs text-slate-400 mb-2">/blog/{p.slug}</p>
                    <p class="text-sm text-slate-300 line-clamp-2 mb-3">{p.excerpt || ""}</p>
                    <div class="flex gap-2">
                      <button
                        onClick={() => setEditing(p)}
                        class="flex-1 btn-gradient rounded py-1.5 text-sm font-semibold"
                      >
                        Edit
                      </button>
                      <button
                        onClick={() => remove(p.id)}
                        class="btn-danger rounded px-4 py-1.5 text-sm"
                      >
                        Delete
                      </button>
                    </div>
                  </div>
                ))}
                {posts.length === 0 && (
                  <div class="col-span-full text-center text-slate-400 py-20">No posts yet.</div>
                )}
              </div>
            )}
          </div>
        );
      }

      function BlogEditor({ post, onSave, onCancel }) {
        const [p, setP] = useState(post);
        const update = (k, v) => setP((cur) => ({ ...cur, [k]: v }));

        return (
          <div class="glass-card rounded-2xl p-6">
            <h2 class="text-xl font-bold mb-5 gradient-text">
              {p.id ? "Edit Post" : "New Post"}
            </h2>
            <div class="grid gap-4">
              <input
                type="text"
                placeholder="Title"
                value={p.title}
                onChange={(e) => update("title", e.target.value)}
                class="input-glass rounded-lg px-4 py-2"
              />
              <input
                type="text"
                placeholder="slug-url-friendly"
                value={p.slug}
                onChange={(e) =>
                  update(
                    "slug",
                    e.target.value
                      .toLowerCase()
                      .replace(/[^a-z0-9-]+/g, "-")
                      .replace(/^-+|-+$/g, ""),
                  )
                }
                class="input-glass rounded-lg px-4 py-2"
              />
              <input
                type="text"
                placeholder="Cover image URL"
                value={p.cover_image || ""}
                onChange={(e) => update("cover_image", e.target.value)}
                class="input-glass rounded-lg px-4 py-2"
              />
              <textarea
                placeholder="Short excerpt / summary"
                value={p.excerpt || ""}
                onChange={(e) => update("excerpt", e.target.value)}
                rows="2"
                class="input-glass rounded-lg px-4 py-2"
              />
              <textarea
                placeholder="Post content (HTML or plain text)"
                value={p.content || ""}
                onChange={(e) => update("content", e.target.value)}
                rows="14"
                class="input-glass rounded-lg px-4 py-2 font-mono text-sm"
              />
              <label class="flex items-center gap-2 text-sm">
                <input
                  type="checkbox"
                  checked={p.is_published !== false}
                  onChange={(e) => update("is_published", e.target.checked)}
                />
                Published
              </label>
              <div class="flex gap-3 justify-end">
                <button onClick={onCancel} class="glass px-5 py-2 rounded-lg">
                  Cancel
                </button>
                <button
                  onClick={() => onSave(p)}
                  class="btn-gradient px-6 py-2 rounded-lg font-semibold"
                >
                  Save
                </button>
              </div>
            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
